

bundle:
  name: databricks-paginated-reports

variables:
  catalog_name:
    description: "Name of the catalog to use"
    default: "reporting_data"
  schema_name:
    description: "Name of the schema to use"
    default: "paginated"
  volume_name:
    description: "Name of the volume to use"
    default: "app_files"
  admin_emails:
    description: "Comma-separated list of admin user emails"
    default: ""
  secret_scope_name:
    description: "Name of the secret scope to use"
    default: "paginated_reports"
  app_config:
    type: complex
    description: "Configuration for paginated-reports"
    default:
      command:
        - "uvicorn"
        - "app:app"
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "8000"
      env:
        - name: 'DATABRICKS_SQL_WAREHOUSE_ID'
          value_from: "sql-warehouse"
        - name: 'LAKEBASE_CATALOG_NAME'
          value: '${var.catalog_name}'
        - name: 'DATABRICKS_SCHEMA'
          value: '${var.schema_name}'
        - name: 'DATABRICKS_VOLUME'
          value: '${var.volume_name}'
        - name: 'LAKEHOUSE_CATALOG_NAME'
          value: '${var.catalog_name}'
        - name: 'LAKEHOUSE_SCHEMA_NAME'
          value: '${var.schema_name}'
        - name: 'ADMIN_EMAILS'
          value: '${var.admin_emails}'
        - name: 'SMTP_SECRET_SCOPE'
          value: '${var.secret_scope_name}'

resources:
  apps:
    paginated-reports:
      name: "paginated-reports"
      description: "Paginated Reports"
      source_code_path: "./back-end"
      config: ${var.app_config}
      user_api_scopes:
        - sql
        - catalog.catalogs:read
        - catalog.schemas:read
        - catalog.tables:read
      resources:
        - name: "sql-warehouse"
          description: "SQL warehouse for the app"
          sql_warehouse:
            id: ${resources.sql_warehouses.paginated_reports_sql_warehouse.id}
            permission: "CAN_USE"
        - name: "database"
          description: "A database for the app to be able to connect to and query"
          database:
            database_name: ${resources.database_catalogs.paginated_reports_db_catalog.database_name}
            instance_name: ${resources.database_catalogs.paginated_reports_db_catalog.database_instance_name}
            permission: "CAN_CONNECT_AND_CREATE"
      permissions:
        - user_name: "*"
          level: "CAN_USE"
  secret_scopes:
    paginated_reports_smtp_secrets:
      name: ${var.secret_scope_name}
      # DABS cannot grant secret scope ACLs to an app service principal at deploy time.
      # After first deploy, run this once to grant the app access:
      #   databricks s put-acl paginated_reports_smtp_secrets <app-service-principal> MANAGE
      # The app service principal name is visible in the App settings page in the Databricks UI.

  database_instances:
    paginated_reports_db_instance:
      name: paginated-reports-db-instance
      capacity: CU_1
  database_catalogs:
    paginated_reports_db_catalog:
      database_instance_name: ${resources.database_instances.paginated_reports_db_instance.name}
      database_name: "paginated_reports_database"
      name: paginated_reports_database_catalog
      create_database_if_not_exists: true

  sql_warehouses:
    paginated_reports_sql_warehouse:
      name: paginated-reports-warehouse
      cluster_size: "X-Small"
      enable_serverless_compute: true
      max_num_clusters: 1
      min_num_clusters: 1
      auto_stop_mins: 10

  catalogs:
    paginated_reports_catalog:
      name: ${var.catalog_name}
  schemas:
    paginated_reports_schema:
      catalog_name: ${var.catalog_name}
      name: ${var.schema_name}
targets:
  dev:
    variables:
      catalog_name: "reporting_data_dev"
      schema_name: "paginated_dev"
      volume_name: "paginated_files_dev"
      secret_scope_name: "paginated_reports_dev"
  prod:
    variables:
      catalog_name: "reporting_data_prod"
      schema_name: "paginated_prod"
      volume_name: "app_files_prod"
      secret_scope_name: "paginated_reports_prod"
